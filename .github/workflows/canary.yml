name: Canary Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/canary-demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ format('{0}/{1}', github.repository_owner, 'canary-demo') | lower }}:${{ github.sha }},
                 ${{ env.REGISTRY }}/${{ format('{0}/{1}', github.repository_owner, 'canary-demo') | lower }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
          
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          SUBDOMAIN="canary-${TIMESTAMP}"
          IMAGE="${{ env.REGISTRY }}/${{ format('{0}/{1}', github.repository_owner, 'canary-demo') | lower }}:${{ github.sha }}"
          
          ssh $EC2_USER@$EC2_HOST << 'EOSCRIPT'
          #!/bin/bash
          set -e
          
          TIMESTAMP="$1"
          SUBDOMAIN="$2"
          IMAGE="$3"
          REGISTRY_TOKEN="$4"
          
          # Log in to registry
          echo "$REGISTRY_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull image
          docker pull "$IMAGE"
          
          # Run container with Traefik labels
          CONTAINER_NAME="canary-${TIMESTAMP}"
          docker run -d \
            --name "$CONTAINER_NAME" \
            --network traefik \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.${CONTAINER_NAME}.rule=Host(\`${SUBDOMAIN}.ogdynex.com\`)" \
            --label "traefik.http.routers.${CONTAINER_NAME}.entrypoints=web" \
            --label "traefik.http.services.${CONTAINER_NAME}.loadbalancer.server.port=3000" \
            "$IMAGE"
          
          echo "Deployed: http://${SUBDOMAIN}.ogdynex.com"
          EOSCRIPT $TIMESTAMP $SUBDOMAIN $IMAGE "$REGISTRY_TOKEN"
